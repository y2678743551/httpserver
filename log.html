<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width,inintial-scale=1.0,user-scalble=yes">
    <title>Document</title>
    
</head>
<body>
    <link rel="stylesheet" href="/style.css">
    <div class="login-container ">
        <h2 style="color: rgba(75, 255, 30, 0.507);">网路聊天室</h2>

        <input type="text" id="username" style="color: rgb(0, 0, 0);" placeholder="账号" >
        
        <input type="text" id="password" style="color: rgb(0, 0, 0); " placeholder="密码">
        
        <button onclick="readInput()">读取</button>
        <p id="result"></p>

    </div>
    
    <script>
        function readInput(){
            //document.getElementById('result').innerText='accept';
            let name=document.getElementById('username').value;
            let code=document.getElementById('password').value;
            fetch('/api/submit',{
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({
                    username:name,
                    password:code
                })
            })
            .then(response=>response.json())
            .then(data=>{
                console.log("响应",data);
                
                if(data.href){
                    window.location.href=data.href
                    }
                document.getElementById('result').innerText=data.status;
                }
            ).catch(error=>(console.error('请求失败',error))
            );
            
        }
    </script>
</body>
</html>
