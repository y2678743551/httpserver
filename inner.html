<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width,inintial-scale=1.0,user-scalble=yes">
    <title>Document</title>
</head>
<body>
    <link rel="stylesheet" href="/style.css">
    <input type="text" id="msg" placeholder="请输入文本">
    <button onclick="readInput()" >读取</button>
    <p id="result"></p>
    <script>
        function readInput(){
            //document.getElementById('result').innerText='accept';
            let msg=document.getElementById('msg').value;

            fetch('/api/submit',{
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({
                    msg:msg
                })
            })
            .then(response=>response.json())
            .then(data=>{
                console.log("响应",data);

                document.getElementById('result').innerText=data.status;
                }
            ).catch(error=>(console.error('请求失败',error))
            );
            
        }
    </script>

</body>
</html>
